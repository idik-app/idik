<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<base target="_top">

<style>
  html, body {
    margin:0; padding:0;
    width:100%; height:100%;
    background:#020710;
    color:#e8faff;
    font-family:"Segoe UI", Arial, sans-serif;
    overflow:hidden;
  }

  .bg-grid {
    position:fixed; inset:0;
    background:
      radial-gradient(circle at 25% 25%, rgba(0,255,255,0.12), transparent 60%),
      radial-gradient(circle at 80% 80%, rgba(0,80,150,0.18), transparent 80%),
      linear-gradient(rgba(0,255,255,0.08) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,255,0.08) 1px, transparent 1px);
  }

  .scanner {
    position:fixed; top:0; left:0;
    width:100%; height:4px;
    background:linear-gradient(90deg,transparent,#0ff,transparent);
    animation:scan 3s linear infinite;
    z-index:10;
  }
  @keyframes scan {
    0%{transform:translateY(0); opacity:.4;}
    50%{opacity:1;}
    100%{transform:translateY(100vh); opacity:.3;}
  }

  .panel {
    position:absolute;
    left:50%; top:50%;
    transform:translate(-50%,-50%);
    width:520px; max-height:88vh;
    padding:28px; padding-bottom:110px;
    border-radius:22px;
    background:rgba(12,30,50,0.42);
    border:1px solid rgba(0,255,255,0.55);
    box-shadow:
      0 0 40px rgba(0,255,255,0.25),
      inset 0 0 60px rgba(0,255,255,0.25);
    backdrop-filter:blur(18px);
    overflow-y:auto;
  }

  .title {
    text-align:center;
    font-size:24px;
    font-weight:700;
    color:#0ff;
    text-shadow:0 0 12px #0ff;
    margin-bottom:18px;
  }

  .close-btn {
    position:absolute; right:14px; top:14px;
    width:32px; height:32px;
    border-radius:50%;
    background:rgba(255,255,255,0.18);
    border:1px solid rgba(255,255,255,0.30);
    color:#fff;
    font-size:16px;
    cursor:pointer;
  }

  .card {
    padding:16px;
    border-radius:16px;
    background:rgba(255,255,255,0.06);
    border-left:3px solid #0ffb;
    margin-bottom:22px;
    box-shadow:0 0 14px rgba(0,255,255,0.18);
  }

  .form-alkes {
    padding:18px;
    margin-bottom:28px;
    border-radius:16px;
    background:rgba(255,255,255,0.07);
    border:1px solid rgba(0,255,255,0.40);
    box-shadow:
      0 0 18px rgba(0,255,255,0.22),
      inset 0 0 15px rgba(0,255,255,0.12);
  }

  .header-alkes {
    font-size:16px;
    font-weight:700;
    margin-bottom:10px;
    color:#0ff;
    text-shadow:0 0 8px #0ff;
  }

  label {
    display:block;
    margin-top:10px;
    font-size:13px;
    color:#c9eeff;
  }

  .form-control {
    width:100%; padding:11px;
    border-radius:12px;
    background:rgba(0,25,50,0.65);
    color:#e8faff;
    border:1px solid #0ff5;
    margin-top:4px;
    font-size:14px;
    transition:0.2s;
  }
  .form-control:focus {
    border-color:#0ff;
    box-shadow:0 0 14px #0ffb;
  }

  .error {
    border-color:#ff4d4d !important;
    box-shadow:0 0 12px rgba(255,0,0,0.6) !important;
  }
  .warn {
    border-color:#ffd400 !important;
    box-shadow:0 0 12px rgba(255,230,0,0.6) !important;
  }

  .button-row {
    display:flex;
    justify-content:space-between;
    gap:14px;
    margin-top:10px;
  }

  .btn {
    flex:1; padding:13px;
    border-radius:14px;
    border:none;
    font-weight:700;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    gap:8px;
    font-size:14px;
  }

  .btn-primary {
    background:rgba(0,255,255,0.22);
    color:#0ff;
    box-shadow:0 0 14px rgba(0,255,255,0.45);
  }

  .btn-danger {
    background:rgba(255,40,40,0.25);
    color:#ffbcbc;
    box-shadow:0 0 14px rgba(255,60,60,0.45);
  }

  .btn-success {
    background:linear-gradient(90deg,#d4af37,#ffe7a0);
    color:#000;
    box-shadow:0 0 16px rgba(255,215,90,0.55);
  }

  #toast {
    position:fixed; bottom:25px; right:25px;
    background:#0ff7;
    color:#000;
    padding:14px 18px;
    border-radius:10px;
    font-weight:700;
    display:none;
    box-shadow:0 0 18px #0ff;
    backdrop-filter:blur(4px);
    z-index:200;
  }
</style>

</head>

<body>

<div class="bg-grid"></div>
<div class="scanner"></div>

<div class="panel">

  <button class="close-btn" onclick="google.script.host.close()">✕</button>

  <div class="title">Form Pemakaian Alkes</div>

  <div class="card">
    <p><b>Tanggal:</b> <span id="tgl">-</span></p>
    <p><b>No. RM:</b> <span id="norm">-</span></p>
    <p><b>Nama:</b> <span id="nama">-</span></p>
    <p><b>Dokter:</b> <span id="dokter">-</span></p>
  </div>

  <div id="pemakaian-list"></div>

  <div class="button-row">
    <button class="btn btn-primary" onclick="tambah()">Tambah Form Alkes</button>
    <button class="btn btn-success" onclick="simpan()">Simpan</button>
    <button class="btn btn-danger" onclick="hapus()">Hapus Form</button>
  </div>

</div>

<div id="toast"></div>

<script>

let ROW_PASIEN = null;
window.BARANG_MASTER = [];

/* ============================================================
   LOAD PASIEN (Fase-2: API Gateway)
============================================================ */
google.script.run
  .withSuccessHandler(function(data){

    ROW_PASIEN = data.row;

    tgl.innerText    = data.tanggal;
    norm.innerText   = data.norm;
    nama.innerText   = data.nama;
    dokter.innerText = data.dokter;

    window.BARANG_MASTER = data.barang;

    tambah();

  })
  .apiLoadPasien();


/* ============================================================
   Tambah Form Alkes
============================================================ */

function tambah(){
  const list = document.getElementById("pemakaian-list");
  const index = list.querySelectorAll(".form-alkes").length + 1;

  const card = document.createElement("div");
  card.className = "form-alkes";

  card.innerHTML = `
    <div class="header-alkes">ALAT #${index}</div>

    <label>Nama Barang</label>
    <input list="listBarang" name="namaBarang[]" class="form-control nama-barang">

    <label>LOT</label>
    <input name="lot[]" class="form-control lot-input">

    <label>Ukuran</label>
    <input name="ukuran[]" class="form-control ukuran-input">

    <label>ED (MM-YYYY)</label>
    <input name="ed[]" class="form-control ed-input">
  `;

  list.appendChild(card);

  if (!document.getElementById("listBarang")) {
    const dl = document.createElement("datalist");
    dl.id = "listBarang";

    window.BARANG_MASTER.forEach(b => {
      const opt = document.createElement("option");
      opt.value = b;
      dl.appendChild(opt);
    });

    document.body.appendChild(dl);
  }

  card.querySelector(".nama-barang").addEventListener("blur", function(){
    if (!window.BARANG_MASTER.includes(this.value.trim())) {
      this.classList.add("warn");
    } else {
      this.classList.remove("warn");
    }
  });
}


/* ============================================================
   Hapus Form
============================================================ */
function hapus(){
  const forms = document.querySelectorAll(".form-alkes");

  if (forms.length > 1) {
    forms[forms.length - 1].remove();
  } else {
    toast("Minimal 1 form wajib ada!");
  }
}


/* ============================================================
   SIMPAN (FINAL) → CLEAN + WA VERSION
============================================================ */
function simpan(){

  const pasien = {
    tanggal: tgl.innerText,
    norm:    norm.innerText,
    nama:    nama.innerText,
    dokter:  dokter.innerText
  };

  const alkes = [];

  document.querySelectorAll(".form-alkes").forEach(card=>{
    const namaBarang = card.querySelector('.nama-barang').value;
    const lot        = card.querySelector('.lot-input').value;
    const ukuran     = card.querySelector('.ukuran-input').value;
    const ed         = card.querySelector('.ed-input').value;

    if (namaBarang && lot && ukuran && ed)
      alkes.push({ namaBarang, lot, ukuran, ed });
  });

  if (alkes.length === 0)
    return toast("Isi minimal 1 alkes!");

  google.script.run
    .withSuccessHandler(function(waText){
        navigator.clipboard.writeText(waText);
        toast("Resume WA disalin ke clipboard");
        setTimeout(()=>google.script.host.close(),750);
    })
    .withFailureHandler(()=>toast("Gagal menyimpan!"))
    .apiSaveResume(ROW_PASIEN, pasien, alkes);
}



/* ============================================================
   Toast
============================================================ */
function toast(msg){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.style.display="block";
  setTimeout(()=>t.style.display="none",3000);
}

</script>

</body>
</html>
